<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiApps — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #19213D;
    --navy-deep: #0E1528;
    --blue: #1974D2;
    --blue-glow: #3B8FE3;
    --blue-soft: #D6E8FA;
    --white: #FFFFFF;
    --offwhite: #FAF9F6;
    --grey: #8A92A6;
    --mango: #FFC229;
    --font: 'Inter', -apple-system, sans-serif;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font);
    background: var(--navy-deep);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
  }

  .page {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  /* ── Glowing orb background ── */
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(25, 116, 210, 0.12) 0%, rgba(25, 116, 210, 0.03) 50%, transparent 70%);
    pointer-events: none;
    animation: pulse 6s ease-in-out infinite;
  }

  /* ── Grid pattern ── */
  .grid-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image:
      linear-gradient(rgba(25, 116, 210, 0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(25, 116, 210, 0.5) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ── App icon ── */
  .icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-glow) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2.5rem;
    box-shadow: 0 8px 32px rgba(25, 116, 210, 0.3);
    animation: fadeUp 0.9s ease 0.1s both;
    position: relative;
  }
  .icon svg { width: 36px; height: 36px; }

  /* ── Brand ── */
  .brand {
    font-size: clamp(3.5rem, 11vw, 7rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.03em;
    animation: fadeUp 0.9s ease 0.3s both;
    position: relative;
  }
  .brand span {
    color: var(--blue);
  }

  .brand-sub {
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    font-weight: 400;
    color: var(--grey);
    letter-spacing: 0.04em;
    margin-top: 0.8rem;
    animation: fadeUp 0.9s ease 0.45s both;
  }

  /* ── Coming Soon ── */
  .coming {
    margin-top: 2.8rem;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--blue);
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: fadeUp 0.9s ease 0.6s both;
  }
  .coming::before,
  .coming::after {
    content: '';
    width: 36px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
  }

  /* ── Tagline ── */
  .tagline {
    margin-top: 1.6rem;
    font-size: clamp(0.8rem, 1.5vw, 0.95rem);
    font-weight: 300;
    color: var(--grey);
    max-width: 380px;
    line-height: 1.7;
    animation: fadeUp 0.9s ease 0.75s both;
  }

  /* ── Powered by DiTa ── */
  .powered {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--grey);
    animation: fadeUp 0.9s ease 0.9s both;
  }
  .powered a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 600;
    letter-spacing: 0.04em;
    transition: color 0.3s;
  }
  .powered a:hover { color: var(--mango); }
  .powered .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--grey);
    opacity: 0.4;
  }
  .powered .tagline-dita {
    font-size: 0.62rem;
    font-weight: 300;
    font-style: italic;
    color: var(--grey);
    opacity: 0.7;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.7; }
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .page { padding: 2rem 1.5rem 4rem; }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 2.5rem;
    }
    .icon svg { width: 40px; height: 40px; }

    .brand {
      font-size: 5.5rem;
      font-weight: 700;
    }

    .brand-sub {
      font-size: 1.05rem;
      margin-top: 0.6rem;
    }

    .coming {
      margin-top: 2.5rem;
      font-size: 0.9rem;
      letter-spacing: 0.3em;
    }

    .tagline {
      margin-top: 1.4rem;
      font-size: 0.95rem;
    }

    .powered {
      bottom: 1.6rem;
      font-size: 0.78rem;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.4rem;
    }

    .glow {
      width: 350px;
      height: 350px;
    }
  }

  @media (max-width: 380px) {
    .brand { font-size: 4.2rem; }
    .brand-sub { font-size: 0.95rem; }
    .icon { width: 68px; height: 68px; }
    .coming { font-size: 0.8rem; }
    .tagline { font-size: 0.88rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; }
    .glow { animation: none; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- Background -->
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <!-- App Icon -->
  <div class="icon">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="8" width="12" height="12" rx="2.5" stroke="#FFF" stroke-width="2" fill="none"/>
      <rect x="20" y="8" width="12" height="12" rx="2.5" stroke="#FFF" stroke-width="2" fill="none" opacity="0.7"/>
      <rect x="4" y="24" width="12" height="8" rx="2.5" stroke="#FFF" stroke-width="2" fill="none" opacity="0.7"/>
      <rect x="20" y="24" width="12" height="8" rx="2.5" stroke="#FFF" stroke-width="2" fill="none" opacity="0.5"/>
      <circle cx="10" cy="4" r="2" fill="#FFC229"/>
    </svg>
  </div>

  <!-- Brand -->
  <h1 class="brand"><span>Di</span>Apps</h1>
  <p class="brand-sub">Smart Apps. Built for Business.</p>

  <!-- Coming Soon -->
  <div class="coming">Coming Soon</div>

  <!-- Tagline -->
  <p class="tagline">A new suite of business applications from DiTa — designed to simplify, automate, and grow.</p>

  <!-- Powered by DiTa -->
  <div class="powered">
    Powered by
    <a href="https://www.ditabc.com" target="_blank" rel="noopener">DiTa</a>
    <span class="dot"></span>
    <span class="tagline-dita">Empower. Innovate. Succeed.</span>
  </div>

</div>

</body>
</html>
